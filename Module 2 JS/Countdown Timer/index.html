<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>TIMER</title>
</head>

<body>
    <div class="MainBox">

        <h1>TIMER</h1>
        <div oninput="displayMin()">
            <input type="number" id="mintues" min="0" max="59" placeholder="mintues">
            <input type="number" id="seconds" min="0" max="59" placeholder="seconds">
        </div>
        <div id="display">00:00</div>
        <div>
            <button id="start" onclick="watch()">START</button>
        </div>

    </div>



</body>
<script src="app.js"></script>

</html>
