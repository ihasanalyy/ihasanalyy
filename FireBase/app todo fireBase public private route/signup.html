<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>Signup</title>
</head>

<body>
    <div class="container m-auto mt-5 ">
        <!-- EMAIL INPUT -->
        <div class="mb-3 w-25 m-auto fw-bold text-center">
            <label for="exampleFormControlInput1" class="form-label">Email</label>
            <input type="email" class="form-control emailInput" id="exampleFormControlInput1"
                placeholder="name@example.com">
        </div>
        <!-- USERNAME -->
        <div class="mb-3 w-25 m-auto fw-bold text-center">
            <div class="input-group flex-nowrap">
                <span class="input-group-text" id="addon-wrapping">@</span>
                <input type="text" class="form-control userNameInput" placeholder="Username" aria-label="Username"
                    aria-describedby="addon-wrapping">
            </div>
        </div>
        <!-- FIRST NAME LAST NAME -->
        <div class="mb-3 w-25 m-auto fw-bold text-center">
            <div class="input-group">

                <input type="text" aria-label="First name" class="form-control firstNameInput" placeholder="First name">
                <input type="text" aria-label="Last name" class="form-control lastNameInput" placeholder="Last name">
            </div>
        </div>
        <!-- PASSWORD INPUT -->
        <div class="mb-3 w-25 m-auto fw-bold text-center">
            <label for="inputPassword5" class="form-label">Password</label>
            <input type="password" id="inputPassword5" class="form-control passwordInput"
                aria-describedby="passwordHelpBlock">
            <div id="passwordHelpBlock" class="form-text">
                Your password must be 8-20 characters long, contain letters and numbers.
            </div>
        </div>
        <div class="mb-3 w-25 m-auto fw-bold text-center">
            <button class="btn btn-primary" onclick="signUpHandler()">Sign-Up</button>
        </div>
        <div class="mb-3 w-25 m-auto fw-bold text-center">
            <a href="./login.html">
                <h6>Already Registered!</h6>
            </a>
        </div>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
    crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
    integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
    crossorigin="anonymous"></script>
<script src="signup.js" type="module"></script>

</html>
